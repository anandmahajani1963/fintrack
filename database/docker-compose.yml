# ============================================================
# fintrack — Database VM (oel9-ccc-db.digilinx.us)
# Deploy: /home/fintrack/fintrack/database/docker-compose.yml
#
# Usage:
#   docker compose up -d          # start
#   docker compose down           # stop (data preserved)
#   docker compose logs -f        # tail logs
#   docker compose ps             # status
# ============================================================

services:
  postgres:
    image: postgres:17-alpine
    container_name: fintrack_db
    restart: unless-stopped

    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
      PGDATA:            /var/lib/postgresql/data

    ports:
      # Bind ONLY to the host-only adapter IP — never 0.0.0.0
      - "192.168.1.169:5432:5432"

    volumes:
      # Persistent data on the 32GB LVM partition
      - ${POSTGRES_DATA_DIR}:/var/lib/postgresql/data

      # Initialisation scripts — run once on first start
      - ./init:/docker-entrypoint-initdb.d:ro

    # PostgreSQL tuning — conservative for 2GB RAM VM
    # Revisit these when you increase VM memory
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c max_connections=50
        -c log_statement=ddl
        -c log_min_duration_statement=1000
        -c log_timezone=UTC
        -c timezone=UTC

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

networks:
  default:
    name: fintrack_db_net
