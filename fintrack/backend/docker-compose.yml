# ============================================================
# fintrack — API VM (oel9-ccc-app.digilinx.us)
# File: /home/fintrack/fintrack/backend/docker-compose.yml
#
# Usage:
#   docker compose build          # build image
#   docker compose up -d          # start
#   docker compose down           # stop
#   docker compose logs -f        # tail logs
#   docker compose ps             # status
#   docker compose build --no-cache && docker compose up -d  # full rebuild
# ============================================================

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fintrack_api
    restart: unless-stopped

    environment:
      # Database — points to DB VM
      DB_HOST:     ${DB_HOST}
      DB_PORT:     ${DB_PORT}
      DB_NAME:     ${DB_NAME}
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

      # API settings
      API_HOST:    ${API_HOST}
      API_PORT:    ${API_PORT}
      API_ENV:     ${API_ENV}
      SECRET_KEY:  ${SECRET_KEY}

      # Token expiry
      ACCESS_TOKEN_EXPIRE_MINUTES:  ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS:    ${REFRESH_TOKEN_EXPIRE_DAYS}

      # Encryption / KDF
      KDF_ALGORITHM:    ${KDF_ALGORITHM}
      KDF_TIME_COST:    ${KDF_TIME_COST}
      KDF_MEMORY_COST:  ${KDF_MEMORY_COST}
      KDF_PARALLELISM:  ${KDF_PARALLELISM}
      KDF_HASH_LENGTH:  ${KDF_HASH_LENGTH}

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL}

    ports:
      # Bind to all interfaces on API VM — Dev VM connects here
      - "0.0.0.0:8000:8000"

    volumes:
      - api_logs:/var/log/fintrack

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  api_logs:
    driver: local

networks:
  default:
    name: fintrack_api_net
