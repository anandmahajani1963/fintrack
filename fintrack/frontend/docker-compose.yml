# ============================================================
# fintrack — Frontend Docker Compose (Dev VM)
# File: frontend/docker-compose.yml
# Version: 1.2 — 2026-04-02
# Changes:
#   v1.2  2026-04-02  nginx now listens on 80 internally
#                     healthcheck updated to port 80
# ============================================================

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fintrack_frontend
    restart: unless-stopped

    environment:
      VITE_API_BASE: http://192.168.1.170:8000

    ports:
      - "0.0.0.0:3000:80"

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

networks:
  default:
    name: fintrack_frontend_net
