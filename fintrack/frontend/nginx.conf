# ============================================================
# fintrack — nginx configuration
# File: frontend/nginx.conf
# Version: 1.2 — 2026-04-02
# Changes:
#   v1.0  2026-03-26  Initial SPA routing + API proxy
#   v1.1  2026-03-30  Custom log format — strips query strings from logs
#   v1.2  2026-04-02  Changed listen port to 80 (nginx-alpine standard)
#                     External port 3000 mapped in docker-compose.yml
#                     Fixes healthcheck "connection refused" on localhost
# ============================================================

log_format fintrack_safe '$remote_addr - [$time_local] '
                         '"$request_method $uri $server_protocol" '
                         '$status $body_bytes_sent '
                         '"$http_referer"';

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log fintrack_safe;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /api/ {
        proxy_pass http://192.168.1.170:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Fintrack-Password $http_x_fintrack_password;
    }

    location ~* \.(js|css|png|jpg|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}
